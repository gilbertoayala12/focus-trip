<div class="timer-container">
    <app-road-background></app-road-background>
    <div class="screen">
        <div class="timer-container__title">
            <h1>How long will you focus?</h1>
            <p>your focus, your journey</p>
        </div>
        <div class="timer-container__available-timers">
            @for (d of timerDuration; track d) {
            <div (click)="select(d)" class="squishy squishy--neon timer-container__available-timers__timers card"
                [class.active]="selected() === d">
                {{ d }} min
            </div>
            }
        </div>
        <button (click)="confirm()" class="squishy squishy--neon btn--confirm" [disabled]="!selected()">
            Confirm Timer
        </button>
    </div>

</div>

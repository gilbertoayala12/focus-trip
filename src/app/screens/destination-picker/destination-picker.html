<div class="destination-container">
    <button (click)="goHome()">home</button>
    <div class="destination-container__selected-timer">
        Selected Timer: {{selectedTimer}}
    </div>

    <div class="destination-container__available-routes">
        @for (route of availableRoutes(); track $index) {
        <div [class.active]="selected() === route" (click)="select(route)" class="destination-container__available-routes__individual-route">
            <div>
                <p>City: {{route.city | titlecase}}</p>
            </div>
            <div>
                <p>From: {{route.from | titlecase}}</p>
                <p>To: {{route.to | titlecase}}</p>
            </div>
            <div>
                <p>Weather: {{route.weather | titlecase}}</p>
            </div>
        </div>
        }
    </div>

    <button class="destination-container__confirm" (click)="confirm()" [disabled]="!selected()">Confirm Route</button>


</div>

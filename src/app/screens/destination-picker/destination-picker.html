<div class="destination-container">
    <app-road-background />
    <app-back></app-back>
    <div class="screen">

        <div class="destination-container__header">
            <h1>Choose your destination</h1>
            <p class="muted">{{ selectedTimer }} min · pick a route</p>
        </div>

        <div class="destination-container__routes">
            @for (route of availableRoutes(); track $index) {
            <div class="route-card" [class.route-card--selected]="selected() === route" (click)="select(route)">

                <div class="route-card__city">{{ route.city | titlecase }}</div>

                <div class="route-card__journey">
                    <span class="route-card__place">{{ route.from }}</span>
                    <span class="route-card__arrow">→</span>
                    <span class="route-card__place">{{ route.to }}</span>
                </div>

                <div class="route-card__badges">
                    <span class="badge">{{ route.weather | titlecase }}</span>
                    <span class="badge">{{ route.scenery | titlecase }}</span>
                </div>

            </div>
            }
        </div>

        <div class="destination-container__footer">
            <button class="squishy squishy--neon btn--confirm" (click)="confirm()" [disabled]="!selected()">
                Start journey
            </button>
        </div>

    </div>
</div>

<div class="map-card">
  <div class="map-card__header">
    <span class="map-card__label">Progress: </span>
    <span class="map-card__pct">{{ progressPct() }}%</span>
  </div>
  <svg #mapSvg viewBox="0 0 340 52">
    <path [attr.d]="pathD"
      fill="none" stroke="rgba(255,255,255,0.08)"
      stroke-width="2.5" stroke-linecap="round"/>
    <path [attr.d]="pathD"
      fill="none" stroke="#F5A623"
      stroke-width="2.5" stroke-linecap="round"
      stroke-dasharray="1000"
      [style.stroke-dashoffset]="dashOffset()"/>
    <circle cx="8"   cy="40" r="4" fill="rgba(255,255,255,0.15)" stroke="#F5A623" stroke-width="1.2"/>
    <circle cx="332" cy="32" r="4" fill="rgba(245,166,35,0.2)"   stroke="#F5A623" stroke-width="1.2"/>
    <g [attr.transform]="'translate(' + trip.position().x + ',' + trip.position().y + ')'">
      <circle r="6"  fill="#F5A623"/>
      <circle r="11" fill="#F5A623" opacity="0.15"/>
      <circle r="16" fill="#F5A623" opacity="0.07"/>
    </g>
  </svg>
</div>
